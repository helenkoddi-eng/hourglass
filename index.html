<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Песочные часы | Просто для учителя</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --text: #333;
            --primary: #8a2be2;
            --panel: #fff;
            --border: #ddd;
            --sand-color: #f39c12;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: transparent; overflow: hidden;
        }

        /* =========================================
           РЕДАКТОР
           ========================================= */
        #editor-container {
            display: none; background-color: var(--bg); color: var(--text);
            width: 100%; height: 100%; padding: 15px; box-sizing: border-box;
            overflow-y: auto; align-items: center; flex-direction: column;
        }
        .panel-box {
            max-width: 950px; width: 100%; background: var(--panel);
            padding: 20px 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        h1 { text-align: center; margin: 0 0 20px; color: var(--primary); font-size: 28px; }
        .layout { display: flex; gap: 40px; flex-wrap: wrap; }
        .controls { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .preview { flex: 1.2; min-width: 300px; display: flex; flex-direction: column; align-items: center; }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 14px; color: #555; }
        input[type="color"] { width: 100%; height: 45px; border: none; border-radius: 10px; cursor: pointer; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; cursor: pointer; background: #f9f9f9; padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
        button.action-btn {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 15px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
            transition: 0.3s; display: flex; justify-content: center; gap: 10px;
        }
        textarea {
            width: 100%; height: 80px; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
            font-family: monospace; font-size: 12px; background: #f4f7f6;
        }
        .preview-box {
            width: 100%; max-width: 340px; aspect-ratio: 9/16;
            border: 2px dashed var(--border); border-radius: 20px;
            background: #eee; position: relative; overflow: hidden; resize: both;
        }
        .preview-box iframe { width: 100%; height: 100%; border: none; }

        footer {
            margin-top: 20px; padding: 15px; border-top: 1px solid var(--border);
            text-align: center; font-size: 13px; color: #777; width: 100%; max-width: 950px;
        }
        .social-links { display: flex; gap: 20px; justify-content: center; margin-top: 10px; }
        .social-links a { color: #777; text-decoration: none; display: flex; align-items: center; gap: 5px; font-weight: 600; }

        /* =========================================
           ВИДЖЕТ
           ========================================= */
        #widget-container {
            display: none; width: 100%; height: 100%;
            flex-direction: column; justify-content: center; align-items: center;
            background: transparent;
        }

        .widget-card {
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 5vmin;
            padding: 6vmin 4vmin; box-sizing: border-box;
            box-shadow: 0 4vmin 10vmin rgba(0,0,0,0.1);
            height: 95vh; aspect-ratio: 10/16;
        }

        /* Поля ввода времени */
        .time-panel {
            display: flex; gap: 2vmin; align-items: center; margin-bottom: 8vmin;
        }
        .time-panel input {
            width: 14vmin; height: 10vmin; background: white; border: none;
            border-radius: 2vmin; font-size: 6vmin; font-weight: 800; text-align: center;
            color: #333; box-shadow: 0 1vmin 2vmin rgba(0,0,0,0.1); outline: none;
        }
        .time-panel span { font-size: 5vmin; font-weight: bold; color: #444; }

        /* Песочные часы */
        .hourglass-area {
            position: relative; width: 30vmin; height: 50vmin;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-body {
            position: absolute; width: 100%; height: 100%;
            background: rgba(255,255,255,0.2);
            clip-path: polygon(0% 0%, 100% 0%, 100% 10%, 60% 50%, 100% 90%, 100% 100%, 0% 100%, 0% 90%, 40% 50%, 0% 10%);
            border: 2px solid rgba(255,255,255,0.5); z-index: 5; pointer-events: none;
        }
        /* Блики */
        .glass-body::after {
            content: ''; position: absolute; top: 5%; left: 10%; width: 15%; height: 40%;
            background: linear-gradient(to right, rgba(255,255,255,0.4), transparent); border-radius: 50%;
        }

        .sand-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
        }

        .wood-cap {
            position: absolute; left: -10%; width: 120%; height: 3vmin;
            background: #443322; border-radius: 1vmin; z-index: 10;
            box-shadow: 0 1vmin 2vmin rgba(0,0,0,0.4);
        }
        .cap-top { top: -1.5vmin; }
        .cap-bottom { bottom: -1.5vmin; }

        /* Кнопки */
        .btn-panel {
            display: flex; gap: 5vmin; margin-top: 8vmin;
        }
        .btn-round {
            width: 12vmin; height: 12vmin; border-radius: 50%; border: none;
            background: white; cursor: pointer; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 1.5vmin 3vmin rgba(0,0,0,0.15); transition: 0.2s;
        }
        .btn-round:active { transform: translateY(0.5vmin) scale(0.95); }
        .btn-round svg { width: 6vmin; height: 6vmin; fill: #444; }
        .btn-reset svg { width: 5vmin; height: 5vmin; }

    </style>
</head>
<body>

<!-- РЕДАКТОР -->
<div id="editor-container">
    <div class="panel-box">
        <h1>Таймер «Песочные часы»</h1>
        <div class="layout">
            <div class="controls">
                <div class="control-group">
                    <label>Цвет песка</label>
                    <input type="color" id="colorPicker" value="#f39c12">
                </div>
                <label class="checkbox-group">
                    <input type="checkbox" id="neonToggle" checked>
                    <span>Эффект свечения</span>
                </label>
                <button id="copyBtn" class="action-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    Скопировать код
                </button>
                <textarea id="codeOutput" readonly></textarea>
            </div>
            <div class="preview">
                <div class="preview-box">
                    <iframe id="previewFrame" allowtransparency="true"></iframe>
                </div>
            </div>
        </div>
        <footer>
            Автор: <b>Кóденцева Алёна</b>, блог <i>Просто для учителя | Easy for busy</i>
            <div class="social-links">
                <a href="https://t.me/easyfrbusy" target="_blank">Telegram</a>
                <a href="https://vk.com/easyfrbusy" target="_blank">ВКонтакте</a>
            </div>
        </footer>
    </div>
</div>

<!-- ВИДЖЕТ -->
<div id="widget-container">
    <div class="widget-card" id="widgetCard">
        <div class="time-panel">
            <input type="number" id="h" value="00" min="0" max="99"><span>:</span>
            <input type="number" id="m" value="01" min="0" max="59"><span>:</span>
            <input type="number" id="s" value="00" min="0" max="59">
        </div>

        <div class="hourglass-area" id="hgWrapper">
            <div class="wood-cap cap-top"></div>
            <div class="glass-body"></div>
            <canvas id="sandCanvas" class="sand-canvas"></canvas>
            <div class="wood-cap cap-bottom"></div>
        </div>

        <div class="btn-panel">
            <button class="btn-round" id="playBtn" onclick="toggleTimer()">
                <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="iconPause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="btn-round btn-reset" onclick="resetTimer()">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const configParam = urlParams.get('config');

// ==========================================
// ЛОГИКА ВИДЖЕТА
// ==========================================
if (configParam) {
    document.getElementById('widget-container').style.display = 'flex';
    const config = JSON.parse(decodeURIComponent(atob(configParam)));
    
    const canvas = document.getElementById('sandCanvas');
    const ctx = canvas.getContext('2d');
    let hInp = document.getElementById('h'), mInp = document.getElementById('m'), sInp = document.getElementById('s');
    let playBtn = document.getElementById('playBtn'), iconPlay = document.getElementById('iconPlay'), iconPause = document.getElementById('iconPause');
    
    let totalSeconds = 0, remainingSeconds = 0, isRunning = false, isFlipped = false;
    let particles = [];
    let timerId = null;

    // Стилизация
    if (config.n) {
        document.getElementById('widgetCard').style.boxShadow = `0 0 8vmin ${config.c}`;
        document.getElementById('widgetCard').style.borderColor = config.c;
    }

    function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const sandColor = config.c;
        const progress = totalSeconds > 0 ? remainingSeconds / totalSeconds : 1;
        
        ctx.fillStyle = sandColor;
        const w = canvas.width, h = canvas.height;
        const centerX = w / 2, centerY = h / 2;

        // Верхняя часть (убывающая воронка)
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(w, 0); ctx.lineTo(centerX + (w*0.1), centerY); ctx.lineTo(centerX - (w*0.1), centerY);
        ctx.clip();
        const topFillHeight = centerY * progress;
        ctx.fillRect(0, centerY - topFillHeight, w, topFillHeight);
        ctx.restore();

        // Нижняя часть (растущая горка)
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(centerX - (w*0.1), centerY); ctx.lineTo(centerX + (w*0.1), centerY); ctx.lineTo(w, h); ctx.lineTo(0, h);
        ctx.clip();
        const bottomFillHeight = centerY * (1 - progress);
        // Горка (треугольник)
        ctx.beginPath();
        ctx.moveTo(centerX, h - bottomFillHeight - 10);
        ctx.lineTo(w, h); ctx.lineTo(0, h);
        ctx.fill();
        ctx.restore();

        // Частицы (струйка)
        if (isRunning && remainingSeconds > 0) {
            if (Math.random() > 0.1) particles.push({ x: centerX + (Math.random()*4-2), y: centerY, v: 2 + Math.random()*3 });
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.y += p.v;
            ctx.fillRect(p.x, p.y, 2, 2);
            if (p.y > h - bottomFillHeight) particles.splice(i, 1);
        }

        requestAnimationFrame(draw);
    }
    draw();

    window.toggleTimer = function() {
        if (!isRunning) {
            const h = parseInt(hInp.value) || 0, m = parseInt(mInp.value) || 0, s = parseInt(sInp.value) || 0;
            const sec = h * 3600 + m * 60 + s;
            if (sec <= 0) return;

            if (remainingSeconds <= 0) {
                totalSeconds = sec;
                remainingSeconds = sec;
                isFlipped = !isFlipped;
                document.getElementById('hgWrapper').style.transform = `rotate(${isFlipped ? 180 : 0}deg)`;
            }

            isRunning = true;
            iconPlay.style.display = 'none'; iconPause.style.display = 'block';
            hInp.disabled = mInp.disabled = sInp.disabled = true;

            timerId = setInterval(() => {
                remainingSeconds--;
                const hh = Math.floor(remainingSeconds / 3600), mm = Math.floor((remainingSeconds % 3600) / 60), ss = remainingSeconds % 60;
                hInp.value = String(hh).padStart(2, '0'); mInp.value = String(mm).padStart(2, '0'); sInp.value = String(ss).padStart(2, '0');

                if (remainingSeconds <= 0) {
                    clearInterval(timerId);
                    isRunning = false;
                    playAlarm();
                    resetTimerUI();
                }
            }, 1000);
        } else {
            clearInterval(timerId);
            isRunning = false;
            iconPlay.style.display = 'block'; iconPause.style.display = 'none';
        }
    };

    window.resetTimer = function() {
        clearInterval(timerId);
        remainingSeconds = 0;
        totalSeconds = 0;
        isRunning = false;
        resetTimerUI();
        particles = [];
    };

    function resetTimerUI() {
        hInp.disabled = mInp.disabled = sInp.disabled = false;
        iconPlay.style.display = 'block'; iconPause.style.display = 'none';
    }

    function playAlarm() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        [440, 554, 659].forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.value = f;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.2);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.2 + 0.5);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i*0.2); osc.stop(audioCtx.currentTime + i*0.2 + 0.5);
        });
    }

} 
// ==========================================
// ЛОГИКА РЕДАКТОРА
// ==========================================
else {
    document.getElementById('editor-container').style.display = 'flex';
    const colorPicker = document.getElementById('colorPicker'), neonToggle = document.getElementById('neonToggle');
    const previewFrame = document.getElementById('previewFrame'), codeOutput = document.getElementById('codeOutput'), copyBtn = document.getElementById('copyBtn');
    const baseUrl = window.location.href.split('?')[0];

    function update() {
        const config = { c: colorPicker.value, n: neonToggle.checked };
        const hash = btoa(encodeURIComponent(JSON.stringify(config)));
        const finalUrl = `${baseUrl}?config=${hash}`;
        previewFrame.src = finalUrl;
        codeOutput.value = `<iframe src="${finalUrl}" style="width:100%; max-width:500px; aspect-ratio:10/16; border:none; border-radius:20px;" allowtransparency="true"></iframe>`;
    }

    [colorPicker, neonToggle].forEach(el => el.addEventListener('input', update));
    copyBtn.onclick = () => {
        codeOutput.select(); document.execCommand('copy');
        copyBtn.innerText = 'Скопировано!'; setTimeout(() => copyBtn.innerText = 'Скопировать код', 2000);
    };
    update();
}
</script>
</body>
</html>
